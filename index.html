<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anomaly Timer - Boss Timer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e17;
            color: #e0e6f0;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #0f1623 0%, #1a1040 100%);
            border-bottom: 2px solid #2a1f5e;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.8em;
            background: linear-gradient(90deg, #a78bfa, #60a5fa, #a78bfa);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }

        .header p {
            color: #7a8baa;
            font-size: 0.9em;
            margin-top: 4px;
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Add Boss Form */
        .add-boss-section {
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .add-boss-section h2 {
            font-size: 1.1em;
            color: #a78bfa;
            margin-bottom: 15px;
        }

        .form-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .form-group label {
            font-size: 0.75em;
            color: #7a8baa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input, .form-group select {
            background: #1e293b;
            border: 1px solid #334155;
            color: #e0e6f0;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.95em;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #a78bfa;
            box-shadow: 0 0 0 2px rgba(167, 139, 250, 0.2);
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #6366f1);
            color: white;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #6d28d9, #4f46e5);
            transform: translateY(-1px);
        }

        .btn-kill {
            background: #065f46;
            color: #34d399;
            font-size: 0.8em;
            padding: 5px 12px;
        }

        .btn-kill:hover { background: #047857; }

        .btn-delete {
            background: transparent;
            color: #ef4444;
            font-size: 0.8em;
            padding: 5px 10px;
            border: 1px solid #7f1d1d;
        }

        .btn-delete:hover { background: #7f1d1d33; }

        .btn-edit-death {
            background: #1e3a5f;
            color: #60a5fa;
            font-size: 0.8em;
            padding: 5px 12px;
        }

        .btn-edit-death:hover { background: #1e4a7f; }

        /* Death time modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal {
            background: #111827;
            border: 1px solid #2a1f5e;
            border-radius: 12px;
            padding: 24px;
            min-width: 320px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .modal h3 {
            color: #a78bfa;
            margin-bottom: 16px;
            font-size: 1.1em;
        }

        .modal .form-group {
            margin-bottom: 12px;
        }

        .modal-buttons {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 16px;
        }

        .btn-cancel {
            background: #1e293b;
            color: #94a3b8;
        }

        .btn-cancel:hover { background: #334155; }

        .death-info {
            font-size: 0.75em;
            color: #f59e0b;
            margin-top: 2px;
        }

        /* Discord settings */
        .discord-section {
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .discord-section h2 {
            font-size: 1.1em;
            color: #5865F2;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .discord-icon {
            width: 20px;
            height: 20px;
            display: inline-block;
        }

        .discord-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .discord-row .form-group {
            flex: 1;
        }

        .discord-status {
            font-size: 0.8em;
            margin-top: 8px;
            padding: 6px 10px;
            border-radius: 6px;
        }

        .discord-status.connected {
            background: #064e3b;
            color: #34d399;
        }

        .discord-status.disconnected {
            background: #1e293b;
            color: #64748b;
        }

        .btn-discord {
            background: #5865F2;
            color: white;
        }

        .btn-discord:hover {
            background: #4752C4;
        }

        .btn-discord-test {
            background: #1e293b;
            color: #5865F2;
            border: 1px solid #5865F2;
        }

        .btn-discord-test:hover {
            background: #5865F233;
        }

        .btn-discord-remove {
            background: transparent;
            color: #ef4444;
            font-size: 0.8em;
            padding: 5px 10px;
        }

        .btn-discord-remove:hover { color: #f87171; }

        .toggle-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            font-size: 0.85em;
            color: #94a3b8;
        }

        .toggle-row input[type="checkbox"] {
            accent-color: #5865F2;
            width: 16px;
            height: 16px;
        }

        /* Boss List */
        .boss-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .boss-card {
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 10px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .boss-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #334155;
            transition: background 0.3s;
        }

        .boss-card.spawning::before {
            background: #ef4444;
            box-shadow: 0 0 10px #ef4444;
        }

        .boss-card.warning::before {
            background: #f59e0b;
            box-shadow: 0 0 10px #f59e0b;
        }

        .boss-card.spawning {
            border-color: #7f1d1d;
            animation: pulse-red 1.5s ease-in-out infinite;
        }

        .boss-card.warning {
            border-color: #78350f;
        }

        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 5px rgba(239, 68, 68, 0.2); }
            50% { box-shadow: 0 0 20px rgba(239, 68, 68, 0.4); }
        }

        .boss-info {
            flex: 1;
        }

        .boss-name {
            font-size: 1.1em;
            font-weight: 600;
            color: #e0e6f0;
        }

        .boss-meta {
            font-size: 0.8em;
            color: #64748b;
            margin-top: 2px;
        }

        .boss-countdown {
            font-size: 1.8em;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            min-width: 130px;
            text-align: right;
        }

        .boss-countdown.active {
            color: #34d399;
        }

        .boss-countdown.warning-text {
            color: #f59e0b;
        }

        .boss-countdown.spawned {
            color: #ef4444;
        }

        .boss-actions {
            display: flex;
            gap: 6px;
            flex-direction: column;
        }

        .status-badge {
            font-size: 0.7em;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-badge.spawned {
            background: #7f1d1d;
            color: #fca5a5;
        }

        .status-badge.waiting {
            background: #064e3b;
            color: #6ee7b7;
        }

        .status-badge.auto-reset {
            background: #78350f;
            color: #fcd34d;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #475569;
        }

        .empty-state p {
            font-size: 1.1em;
            margin-bottom: 5px;
        }

        .controls-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .controls-bar h2 {
            font-size: 1em;
            color: #94a3b8;
        }

        .sort-indicator {
            font-size: 0.8em;
            color: #64748b;
        }

        /* Alert time input */
        .alert-time-group {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.75em;
            color: #64748b;
        }

        .alert-time-group input {
            width: 40px;
            background: #1e293b;
            border: 1px solid #334155;
            color: #e0e6f0;
            padding: 2px 4px;
            border-radius: 4px;
            text-align: center;
            font-size: 1em;
        }

        /* Notification toast */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            background: #1e293b;
            border: 1px solid #f59e0b;
            border-radius: 8px;
            padding: 12px 16px;
            color: #fcd34d;
            font-weight: 600;
            animation: slide-in 0.3s ease-out;
            box-shadow: 0 4px 20px rgba(245, 158, 11, 0.3);
        }

        @keyframes slide-in {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Setup section */
        .setup-section {
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .setup-section h2 {
            font-size: 1.1em;
            color: #60a5fa;
            margin-bottom: 15px;
        }

        .setup-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .setup-row .form-group { flex: 1; }

        .setup-status {
            font-size: 0.8em;
            margin-top: 8px;
            padding: 6px 10px;
            border-radius: 6px;
        }

        .setup-status.connected { background: #064e3b; color: #34d399; }
        .setup-status.disconnected { background: #7f1d1d; color: #fca5a5; }

        /* Boss list show more */
        .boss-hidden {
            display: none;
        }

        .boss-list.show-all .boss-hidden {
            display: flex;
        }

        .boss-show-more {
            width: 100%;
            margin-top: 8px;
            background: #1e293b;
            color: #94a3b8;
            padding: 10px;
            text-align: center;
            border-radius: 8px;
        }

        .boss-show-more:hover {
            background: #334155;
            color: #e0e6f0;
        }

        .btn-export {
            background: #1e3a5f;
            color: #60a5fa;
            border: 1px solid #2563eb44;
            font-size: 0.8em;
            padding: 6px 12px;
        }

        .btn-export:hover { background: #1e4070; }

        .btn-import {
            background: #1e3a2f;
            color: #4ade80;
            border: 1px solid #22c55e44;
            font-size: 0.8em;
            padding: 6px 12px;
        }

        .btn-import:hover { background: #1e4a3a; }

        /* Collapsible sections */
        .collapsible-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .collapsible-header .toggle-arrow {
            font-size: 0.8em;
            color: #64748b;
            transition: transform 0.2s;
        }

        .collapsible-header .toggle-arrow.open {
            transform: rotate(180deg);
        }

        .collapsible-body {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.3s ease-out;
        }

        .collapsible-body.open {
            max-height: 600px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .form-row { flex-direction: column; }
            .boss-card { flex-wrap: wrap; }
            .boss-countdown { font-size: 1.4em; min-width: auto; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Anomaly Timer</h1>
        <p>Boss Spawn Timer</p>
    </div>

    <div class="container">
        <!-- Add Boss — always visible at top -->
        <div class="add-boss-section">
            <h2>+ Add Boss</h2>
            <div class="form-row">
                    <div class="form-group" style="flex:2">
                        <label>Boss Name</label>
                        <input type="text" id="bossName" placeholder="e.g. Dragon Lord">
                    </div>
                    <div class="form-group">
                        <label>Spawn Type</label>
                        <select id="spawnType" onchange="toggleSpawnInputs()">
                            <option value="interval">Repeating Interval</option>
                            <option value="fixed">Fixed Time of Day</option>
                            <option value="weekly">Fixed Day of Week</option>
                            <option value="biweekly">Twice a Week</option>
                        </select>
                    </div>
                    <div class="form-group" id="intervalGroup">
                        <label>Interval</label>
                        <div style="display:flex;gap:5px;">
                            <input type="number" id="intervalHours" placeholder="H" min="0" style="width:55px">
                            <input type="number" id="intervalMinutes" placeholder="M" min="0" max="59" style="width:55px">
                        </div>
                    </div>
                    <div class="form-group" id="fixedGroup" style="display:none">
                        <label>Spawn Time</label>
                        <input type="time" id="fixedTime">
                    </div>
                    <div class="form-group" id="weeklyGroup" style="display:none">
                        <label>Day & Time</label>
                        <div style="display:flex;gap:5px;">
                            <select id="weeklyDay">
                                <option value="0">Sunday</option>
                                <option value="1">Monday</option>
                                <option value="2">Tuesday</option>
                                <option value="3">Wednesday</option>
                                <option value="4">Thursday</option>
                                <option value="5">Friday</option>
                                <option value="6">Saturday</option>
                            </select>
                            <input type="time" id="weeklyTime">
                        </div>
                    </div>
                    <div class="form-group" id="biweeklyGroup" style="display:none">
                        <label>Day 1 & Day 2</label>
                        <div style="display:flex;flex-direction:column;gap:5px;">
                            <div style="display:flex;gap:5px;">
                                <select id="biweeklyDay1">
                                    <option value="0">Sun</option>
                                    <option value="1">Mon</option>
                                    <option value="2">Tue</option>
                                    <option value="3">Wed</option>
                                    <option value="4">Thu</option>
                                    <option value="5">Fri</option>
                                    <option value="6">Sat</option>
                                </select>
                                <input type="time" id="biweeklyTime1">
                            </div>
                            <div style="display:flex;gap:5px;">
                                <select id="biweeklyDay2">
                                    <option value="0">Sun</option>
                                    <option value="1">Mon</option>
                                    <option value="2">Tue</option>
                                    <option value="3">Wed</option>
                                    <option value="4">Thu</option>
                                    <option value="5">Fri</option>
                                    <option value="6">Sat</option>
                                </select>
                                <input type="time" id="biweeklyTime2">
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Alert (min)</label>
                        <input type="number" id="alertMinutes" value="5" min="1" max="60" style="width:55px">
                    </div>
                    <div class="form-group">
                        <button class="btn btn-primary" onclick="addBoss()">Add</button>
                    </div>
                </div>
        </div>

        <!-- Boss Timers -->
        <div class="controls-bar">
            <h2>Boss Timers</h2>
            <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                <input type="text" id="bossSearch" placeholder="Search bosses..." oninput="renderBosses()" style="background:#1e293b;border:1px solid #334155;color:#e0e6f0;padding:6px 12px;border-radius:6px;font-size:0.85em;width:180px;">
                <button class="btn btn-export" onclick="exportBosses()" title="Export boss data">Export</button>
                <button class="btn btn-import" onclick="document.getElementById('importFile').click()" title="Import boss data">Import</button>
                <input type="file" id="importFile" accept=".json" style="display:none" onchange="importBosses(event)">
                <span class="sort-indicator">Sorted by next spawn</span>
            </div>
        </div>

        <div class="boss-list" id="bossList" style="margin-bottom: 20px;">
            <div class="empty-state">
                <p>No bosses tracked yet</p>
                <span>Add a boss above to start tracking</span>
            </div>
        </div>

        <!-- Server Connection — collapsible -->
        <div class="setup-section" id="setupSection">
            <div class="collapsible-header" onclick="toggleSection('setupBody', this)">
                <h2>Server Connection</h2>
                <span class="toggle-arrow">&#9660;</span>
            </div>
            <div class="collapsible-body" id="setupBody">
                <div class="setup-row" style="margin-top:15px;">
                    <div class="form-group">
                        <label>Auth Token</label>
                        <input type="password" id="authToken" placeholder="Your auth token">
                    </div>
                    <div class="form-group">
                        <button class="btn btn-primary" onclick="connectServer()">Connect</button>
                    </div>
                </div>
                <div id="setupStatus"></div>
            </div>
        </div>

        <!-- Discord Webhook — collapsible -->
        <div class="discord-section">
            <div class="collapsible-header" onclick="toggleSection('discordBody', this)">
                <h2>
                    <svg class="discord-icon" viewBox="0 0 24 24" fill="#5865F2"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
                    Discord Webhook
                </h2>
                <span class="toggle-arrow">&#9660;</span>
            </div>
            <div class="collapsible-body" id="discordBody">
                <div class="discord-row" style="margin-top:15px;">
                    <div class="form-group">
                        <label>Webhook URL</label>
                        <input type="text" id="discordWebhook" placeholder="https://discord.com/api/webhooks/..." value="">
                    </div>
                    <div class="form-group">
                        <button class="btn btn-discord" onclick="saveDiscordWebhook()">Save</button>
                    </div>
                    <div class="form-group">
                        <button class="btn btn-discord-test" onclick="testDiscordWebhook()">Test</button>
                    </div>
                </div>
                <div class="toggle-row">
                    <input type="checkbox" id="discordOnWarning" checked onchange="saveDiscordSettings()">
                    <label for="discordOnWarning">Notify on warning (before spawn)</label>
                </div>
                <div class="toggle-row">
                    <input type="checkbox" id="discordOnSpawn" checked onchange="saveDiscordSettings()">
                    <label for="discordOnSpawn">Notify on spawn</label>
                </div>
                <div id="discordStatus"></div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <div id="deathModal"></div>

    <script>
        const API_BASE = 'https://boss-timer.xpropics.workers.dev';
        let authToken = localStorage.getItem('boss_timer_token') || '';
        let bosses = [];
        let alertedBosses = new Set();
        let audioCtx = null;
        let connected = false;
        let userRole = null;

        // --- API helpers ---

        async function api(method, path, body) {
            const opts = {
                method,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${authToken}`,
                },
            };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(API_BASE + path, opts);
            if (res.status === 401) {
                showToast('Unauthorized - check your token');
                return null;
            }
            return res.json();
        }

        async function fetchBosses() {
            const data = await api('GET', '/api/bosses');
            if (data) bosses = data.bosses || [];
        }

        // --- Connection ---

        async function connectServer() {
            authToken = document.getElementById('authToken').value.trim();
            if (!authToken) { showToast('Enter your auth token'); return; }
            localStorage.setItem('boss_timer_token', authToken);

            const data = await api('GET', '/api/bosses');
            if (data) {
                bosses = data.bosses || [];
                userRole = data.role || 'viewer';
                connected = true;
                document.getElementById('setupStatus').innerHTML =
                    `<div class="setup-status connected">Connected as ${userRole}</div>`;
                showToast(`Connected as ${userRole}!`);
                applyRoleVisibility();
                renderBosses();
                initDiscord();
            } else {
                document.getElementById('setupStatus').innerHTML =
                    '<div class="setup-status disconnected">Connection failed</div>';
            }
        }

        // --- Discord ---

        async function initDiscord() {
            const data = await api('GET', '/api/config');
            if (!data) return;
            document.getElementById('discordWebhook').value = data.webhookUrl || '';
            document.getElementById('discordOnWarning').checked = data.onWarning !== false;
            document.getElementById('discordOnSpawn').checked = data.onSpawn !== false;
            updateDiscordStatus(data.webhookUrl);
        }

        async function saveDiscordWebhook() {
            const url = document.getElementById('discordWebhook').value.trim();
            await api('PUT', '/api/config', { webhookUrl: url });
            updateDiscordStatus(url);
            showToast(url ? 'Discord webhook saved' : 'Discord webhook removed');
        }

        async function saveDiscordSettings() {
            await api('PUT', '/api/config', {
                onWarning: document.getElementById('discordOnWarning').checked,
                onSpawn: document.getElementById('discordOnSpawn').checked,
            });
        }

        function updateDiscordStatus(url) {
            const el = document.getElementById('discordStatus');
            if (url) {
                el.innerHTML = '<div class="discord-status connected">Webhook connected</div>';
            } else {
                el.innerHTML = '<div class="discord-status disconnected">No webhook configured</div>';
            }
        }

        async function testDiscordWebhook() {
            const data = await api('POST', '/api/config/test');
            if (data && data.ok) showToast('Test message sent to Discord');
            else showToast('Test failed - check webhook URL');
        }

        // --- Collapsible sections ---

        function applyRoleVisibility() {
            const isAdmin = userRole === 'admin';
            // Hide add boss and discord sections for viewers
            document.querySelectorAll('.add-boss-section, .discord-section').forEach(el => {
                el.style.display = isAdmin ? '' : 'none';
            });
        }

        function toggleBossList() {
            const list = document.getElementById('bossList');
            list.classList.toggle('show-all');
            renderBosses();
        }

        function toggleSection(bodyId, headerEl) {
            const body = document.getElementById(bodyId);
            const arrow = headerEl.querySelector('.toggle-arrow');
            body.classList.toggle('open');
            arrow.classList.toggle('open');
        }

        // --- Audio ---

        function getAudioContext() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            return audioCtx;
        }

        function playAlertSound() {
            try {
                const ctx = getAudioContext();
                const now = ctx.currentTime;
                for (let i = 0; i < 3; i++) {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'sine';
                    osc.frequency.value = i % 2 === 0 ? 880 : 660;
                    gain.gain.setValueAtTime(0.15, now + i * 0.2);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.2 + 0.18);
                    osc.start(now + i * 0.2);
                    osc.stop(now + i * 0.2 + 0.2);
                }
            } catch (e) {}
        }

        // --- Boss CRUD ---

        function toggleSpawnInputs() {
            const type = document.getElementById('spawnType').value;
            document.getElementById('intervalGroup').style.display = type === 'interval' ? '' : 'none';
            document.getElementById('fixedGroup').style.display = type === 'fixed' ? '' : 'none';
            document.getElementById('weeklyGroup').style.display = type === 'weekly' ? '' : 'none';
            document.getElementById('biweeklyGroup').style.display = type === 'biweekly' ? '' : 'none';
        }

        // Track recently added boss IDs to suppress immediate alerts
        const recentlyAdded = new Set();

        async function addBoss() {
            if (!connected) { showToast('Connect to server first'); return; }
            const name = document.getElementById('bossName').value.trim();
            if (!name) return;

            const type = document.getElementById('spawnType').value;
            const alertMin = parseInt(document.getElementById('alertMinutes').value) || 5;

            let body = { name, type, alertMinutes: alertMin };

            if (type === 'interval') {
                const h = parseInt(document.getElementById('intervalHours').value) || 0;
                const m = parseInt(document.getElementById('intervalMinutes').value) || 0;
                if (h === 0 && m === 0) return;
                body.intervalMs = (h * 3600 + m * 60) * 1000;
            } else if (type === 'fixed') {
                body.fixedTime = document.getElementById('fixedTime').value;
                if (!body.fixedTime) return;
            } else if (type === 'weekly') {
                body.weeklyDay = parseInt(document.getElementById('weeklyDay').value);
                body.weeklyTime = document.getElementById('weeklyTime').value;
                if (!body.weeklyTime) return;
            } else if (type === 'biweekly') {
                const day1 = parseInt(document.getElementById('biweeklyDay1').value);
                const time1 = document.getElementById('biweeklyTime1').value;
                const day2 = parseInt(document.getElementById('biweeklyDay2').value);
                const time2 = document.getElementById('biweeklyTime2').value;
                if (!time1 || !time2) return;
                body.biweeklyDays = [{ day: day1, time: time1 }, { day: day2, time: time2 }];
            }

            const result = await api('POST', '/api/bosses', body);
            if (result && result.boss) {
                // Suppress alerts for this boss for 30 seconds
                recentlyAdded.add(result.boss.id);
                alertedBosses.add(result.boss.id + '_warn');
                alertedBosses.add(result.boss.id + '_spawn');
                setTimeout(() => {
                    recentlyAdded.delete(result.boss.id);
                    alertedBosses.delete(result.boss.id + '_warn');
                    alertedBosses.delete(result.boss.id + '_spawn');
                }, 30000);
            }
            await fetchBosses();
            renderBosses();

            document.getElementById('bossName').value = '';
            document.getElementById('intervalHours').value = '';
            document.getElementById('intervalMinutes').value = '';
            showToast(`${name} added`);
        }

        async function killBoss(id) {
            await api('POST', `/api/bosses/${id}/kill`, { deathTime: Date.now() });
            alertedBosses.delete(id);
            await fetchBosses();
            renderBosses();
        }

        function openDeathTimeModal(id) {
            const boss = bosses.find(b => b.id === id);
            if (!boss) return;

            const now = new Date();
            const defaultDate = now.toISOString().slice(0, 10);
            const defaultTime = now.toTimeString().slice(0, 5);

            document.getElementById('deathModal').innerHTML = `
                <div class="modal-overlay" onclick="closeDeathModal(event)">
                    <div class="modal" onclick="event.stopPropagation()">
                        <h3>Set Death Time: ${esc(boss.name)}</h3>
                        <div class="form-group">
                            <label>Date</label>
                            <input type="date" id="deathDate" value="${defaultDate}">
                        </div>
                        <div class="form-group">
                            <label>Time</label>
                            <input type="time" id="deathTime" value="${defaultTime}" step="60">
                        </div>
                        <div class="modal-buttons">
                            <button class="btn btn-cancel" onclick="closeDeathModal()">Cancel</button>
                            <button class="btn btn-primary" onclick="confirmDeathTime('${id}')">Set Death Time</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function closeDeathModal(event) {
            if (event && event.target !== event.currentTarget) return;
            document.getElementById('deathModal').innerHTML = '';
        }

        async function confirmDeathTime(id) {
            const dateVal = document.getElementById('deathDate').value;
            const timeVal = document.getElementById('deathTime').value;
            if (!dateVal || !timeVal) return;
            const deathTime = new Date(`${dateVal}T${timeVal}`).getTime();
            if (isNaN(deathTime)) return;
            await api('POST', `/api/bosses/${id}/kill`, { deathTime });
            alertedBosses.delete(id);
            await fetchBosses();
            renderBosses();
            closeDeathModal();
            showToast('Death time updated');
        }

        async function deleteBoss(id) {
            await api('DELETE', `/api/bosses/${id}`);
            alertedBosses.delete(id);
            await fetchBosses();
            renderBosses();
        }

        // --- Export / Import ---

        function exportBosses() {
            if (!connected || bosses.length === 0) { showToast('No bosses to export'); return; }

            const exportData = {
                version: 1,
                exportedAt: Date.now(),
                bosses: bosses.map(b => {
                    const entry = {
                        name: b.name,
                        type: b.type,
                        alertMinutes: b.alertMinutes,
                        lastDeath: b.lastDeath || null,
                    };
                    if (b.type === 'interval') entry.intervalMs = b.intervalMs;
                    if (b.type === 'fixed') entry.fixedTime = b.fixedTime;
                    if (b.type === 'weekly') { entry.weeklyDay = b.weeklyDay; entry.weeklyTime = b.weeklyTime; }
                    if (b.type === 'biweekly') entry.biweeklyDays = b.biweeklyDays;
                    return entry;
                }),
            };

            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `boss-timers-${new Date().toISOString().slice(0, 10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            showToast(`Exported ${bosses.length} boss(es)`);
        }

        async function importBosses(event) {
            const file = event.target.files[0];
            if (!file) return;
            event.target.value = '';

            if (!connected) { showToast('Connect to server first'); return; }
            if (userRole !== 'admin') { showToast('Admin access required to import'); return; }

            try {
                const text = await file.text();
                const data = JSON.parse(text);

                if (!data.bosses || !Array.isArray(data.bosses)) {
                    showToast('Invalid file format'); return;
                }

                const count = data.bosses.length;
                if (count === 0) { showToast('No bosses in file'); return; }

                // Confirm before importing
                const existing = bosses.map(b => b.name.toLowerCase());
                const dupes = data.bosses.filter(b => existing.includes(b.name.toLowerCase()));
                let msg = `Import ${count} boss(es)?`;
                if (dupes.length > 0) msg += `\n${dupes.length} already exist and will be skipped.`;
                if (!confirm(msg)) return;

                let added = 0;
                const validTypes = ['interval', 'fixed', 'weekly', 'biweekly'];
                for (const b of data.bosses) {
                    // Validate required fields
                    if (!b.name || typeof b.name !== 'string' || !validTypes.includes(b.type)) continue;
                    if (b.name.length > 100) continue;

                    // Skip duplicates
                    if (existing.includes(b.name.toLowerCase())) continue;

                    // Build the boss creation body
                    const body = {
                        name: b.name,
                        type: b.type,
                        alertMinutes: b.alertMinutes || 5,
                    };
                    if (b.type === 'interval') body.intervalMs = b.intervalMs;
                    if (b.type === 'fixed') body.fixedTime = b.fixedTime;
                    if (b.type === 'weekly') { body.weeklyDay = b.weeklyDay; body.weeklyTime = b.weeklyTime; }
                    if (b.type === 'biweekly') body.biweeklyDays = b.biweeklyDays;

                    const result = await api('POST', '/api/bosses', body);

                    // If the boss has a lastDeath, recalculate timer from that death time
                    if (result && result.boss && b.lastDeath) {
                        recentlyAdded.add(result.boss.id);
                        alertedBosses.add(result.boss.id + '_warn');
                        alertedBosses.add(result.boss.id + '_spawn');
                        await api('POST', `/api/bosses/${result.boss.id}/kill`, { deathTime: b.lastDeath });
                        setTimeout(() => {
                            recentlyAdded.delete(result.boss.id);
                            alertedBosses.delete(result.boss.id + '_warn');
                            alertedBosses.delete(result.boss.id + '_spawn');
                        }, 5000);
                    }
                    added++;
                }

                await fetchBosses();
                renderBosses();
                showToast(`Imported ${added} boss(es)${dupes.length ? `, skipped ${dupes.length} duplicate(s)` : ''}`);
            } catch (e) {
                showToast('Failed to import: ' + e.message);
            }
        }

        // --- Sanitization ---

        function esc(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        // --- Display ---

        function formatTime(ms) {
            if (ms <= 0) return '00:00';
            const totalSec = Math.floor(ms / 1000);
            const h = Math.floor(totalSec / 3600);
            const m = Math.floor((totalSec % 3600) / 60);
            const s = totalSec % 60;
            if (h > 0) return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

        function formatMeta(boss) {
            if (boss.type === 'interval') {
                const totalMin = boss.intervalMs / 60000;
                const h = Math.floor(totalMin / 60);
                const m = totalMin % 60;
                let str = 'Every ';
                if (h > 0) str += `${h}h `;
                if (m > 0) str += `${m}m`;
                return str.trim();
            } else if (boss.type === 'weekly') {
                return `Every ${dayNames[boss.weeklyDay]} at ${boss.weeklyTime}`;
            } else if (boss.type === 'biweekly') {
                const d = boss.biweeklyDays;
                return `${dayNames[d[0].day]} ${d[0].time} & ${dayNames[d[1].day]} ${d[1].time}`;
            } else {
                return `Daily at ${boss.fixedTime}`;
            }
        }

        function showToast(message) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }

        function renderBosses() {
            const list = document.getElementById('bossList');

            if (bosses.length === 0) {
                list.innerHTML = '<div class="empty-state"><p>No bosses tracked yet</p><span>Add a boss above to start tracking</span></div>';
                return;
            }

            const search = (document.getElementById('bossSearch').value || '').toLowerCase();
            const filtered = search ? bosses.filter(b => b.name.toLowerCase().includes(search)) : bosses;

            if (filtered.length === 0 && search) {
                list.innerHTML = '<div class="empty-state"><p>No bosses match your search</p></div>';
                return;
            }

            const sorted = [...filtered].sort((a, b) => {
                if (a.status === 'spawned' && b.status !== 'spawned') return -1;
                if (b.status === 'spawned' && a.status !== 'spawned') return 1;
                return a.nextSpawn - b.nextSpawn;
            });

            const VISIBLE_COUNT = 5;
            const cards = sorted.map((boss, index) => {
                const now = Date.now();
                const remaining = boss.nextSpawn - now;
                const alertMs = boss.alertMinutes * 60000;
                const isWarning = remaining > 0 && remaining <= alertMs;
                const isSpawned = remaining <= 0;

                let cardClass = 'boss-card';
                if (isSpawned || boss.status === 'spawned') cardClass += ' spawning';
                else if (isWarning) cardClass += ' warning';
                if (index >= VISIBLE_COUNT) cardClass += ' boss-hidden';

                let countdownClass = 'boss-countdown active';
                let countdownText = formatTime(remaining);
                let statusBadge = '<span class="status-badge waiting">Waiting</span>';

                if (isSpawned || boss.status === 'spawned') {
                    countdownClass = 'boss-countdown spawned';
                    countdownText = 'SPAWNED';
                    statusBadge = '<span class="status-badge spawned">Spawned!</span>';
                } else if (isWarning) {
                    countdownClass = 'boss-countdown warning-text';
                }

                return `
                    <div class="${cardClass}" data-id="${boss.id}">
                        <div class="boss-info">
                            <div class="boss-name">${esc(boss.name)}</div>
                            <div class="boss-meta">${formatMeta(boss)} | Alert: ${boss.alertMinutes}m before</div>
                            ${boss.lastDeath ? `<div class="death-info">Last killed: ${new Date(boss.lastDeath).toLocaleString()}</div>` : ''}
                        </div>
                        ${statusBadge}
                        <div class="${countdownClass}">${countdownText}</div>
                        ${userRole === 'admin' ? `<div class="boss-actions">
                            <button class="btn btn-kill" onclick="killBoss('${boss.id}')">Killed</button>
                            <button class="btn btn-edit-death" onclick="openDeathTimeModal('${boss.id}')">Set Death</button>
                            <button class="btn btn-delete" onclick="deleteBoss('${boss.id}')">Remove</button>
                        </div>` : ''}
                    </div>
                `;
            });

            let html = cards.join('');
            if (sorted.length > VISIBLE_COUNT) {
                const hiddenCount = sorted.length - VISIBLE_COUNT;
                const expanded = document.getElementById('bossList')?.classList.contains('show-all');
                html += `<button class="btn boss-show-more" onclick="toggleBossList()">
                    ${expanded ? 'Show Less' : `Show ${hiddenCount} More`}
                </button>`;
            }
            list.innerHTML = html;

            if (document.getElementById('bossList')?.classList.contains('show-all')) {
                list.querySelectorAll('.boss-hidden').forEach(el => el.style.display = '');
            }
        }

        // --- Tick: update countdowns + local alerts ---

        function tick() {
            if (!connected) return;
            const now = Date.now();

            bosses.forEach(boss => {
                const remaining = boss.nextSpawn - now;
                const alertMs = boss.alertMinutes * 60000;

                if (remaining > 0 && remaining <= alertMs && !alertedBosses.has(boss.id + '_warn')) {
                    alertedBosses.add(boss.id + '_warn');
                    playAlertSound();
                    showToast(`${boss.name} spawns in ${boss.alertMinutes} minutes!`);
                }

                if (remaining <= 0 && !alertedBosses.has(boss.id + '_spawn')) {
                    alertedBosses.add(boss.id + '_spawn');
                    playAlertSound();
                    showToast(`${boss.name} has SPAWNED!`);
                }
            });

            renderBosses();
        }

        // --- Init ---

        // Auto-connect if token saved
        if (authToken) {
            document.getElementById('authToken').value = authToken;
            connectServer();
        }

        // Refresh from server every 10 seconds
        setInterval(async () => {
            if (!connected) return;
            await fetchBosses();
        }, 10000);

        // Update display every second
        setInterval(tick, 1000);

        // Enable audio on first click
        document.addEventListener('click', () => {
            if (!audioCtx) getAudioContext();
        }, { once: true });
    </script>
</body>
</html>
